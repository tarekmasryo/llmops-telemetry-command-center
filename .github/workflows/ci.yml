name: LLMOps Telemetry Command Center CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Python ${{ matrix.python-version }} checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: python -m ruff check app.py src tests scripts

      - name: Format check
        run: python -m ruff format --check app.py src tests scripts

      - name: Compile
        run: python -m compileall app.py src tests scripts

      - name: Test
        run: python scripts/run_tests.py

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build and smoke-test Docker image
        run: python scripts/docker_smoke_test.py --image llmops-telemetry-command-center:ci --build